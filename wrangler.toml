name = "cbot"
main = "telegram-multipurpose-worker.js"
compatibility_date = "2026-07-20"

[vars]
ADMIN_CHAT_ID = "7204112173"
CHANNEL_ID = "@cucksclub"

[triggers]
crons = ["*/5 * * * *"]

[[kv_namespaces]]
binding = "BOT_KV"
id = "618015e3fa1f46028300b92e16cf5da6"

# Keep BOT_TOKEN only in Cloudflare Secrets, never in GitHub.
# The bot must be an admin in @cucksclub to publish approved posts.
